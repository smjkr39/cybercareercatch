<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberCareerCatch - 자유게시판</title>
  <link rel="stylesheet" href="../../../assets/css/main/community/post-list.css">
</head>
<body>
  <main class="qna-list-main">
    <div class="qna-list-top">
      <h2 class="qna-list-title">자유게시판</h2>
    </div>

    <table class="qna-list-tbl">
      <thead>
        <tr>
          <th>번호</th>
          <th>제목</th>
          <th>작성자</th>
          <th>작성일</th>
          <th>조회</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="qnaTableBody"></tbody>
    </table>

    <div class="qna-list-pg" id="qnaPagination"></div>

    <div class="qna-list-search">
      <select class="qna-list-search-sel" id="searchType">
        <option value="title">제목</option>
        <option value="writer">작성자</option>
        <option value="content">내용</option>
      </select>

      <input
        class="qna-list-search-inp"
        type="text"
        placeholder="검색할 내용을 입력하세요"
        id="searchInput"
      >

      <button class="qna-list-search-btn" id="btnSearch" type="button">검색</button>
      <a href="add-post.html" class="qna-list-search-btn qna-list-search-btn-write">글쓰기</a>
    </div>
  </main>

  <script src="../../../assets/js/main/community/post-list.js"></script>
</body>
</html>
