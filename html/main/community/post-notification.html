<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항</title>
  <link rel="stylesheet" href="../../../assets/css/main/community/post-notification.css">
</head>
<body>
  <main class="notice-main">
    <div class="notice-top">
      <h2 class="notice-title">공지사항</h2>
      <a href="post-list.html" class="notice-move-btn">자유게시판으로 이동하기</a>
    </div>

    <div class="notice-box">
      <div class="notice-head">
        <h3 class="notice-head-title" id="noticeTitle">공지 제목</h3>
        <div class="notice-head-info">
          <span id="noticeWriter">작성자: 관리자</span>
          <span id="noticeDate">| 작성일: 260308</span>
          <span id="noticeViews">| 조회수: 0</span>
        </div>
      </div>

      <div class="notice-content" id="noticeContent">
        공지 내용이 여기에 표시됩니다.
      </div>

      <div class="notice-bottom">
        <a href="post-list.html" class="notice-btn">목록으로</a>
      </div>
    </div>
  </main>

  <script src="../../../assets/js/main/community/notice-detail.js"></script>
</body>
</html>
